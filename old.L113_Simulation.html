<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Natural Selection Simulator — Penicillin Resistance</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap');

  :root {
    --green: #1D9E75;
    --green-dark: #085041;
    --green-light: #E1F5EE;
    --red: #C0392B;
    --amber: #d97706;
    --amber-light: #fef3c7;
    --navy: #1a2744;
    --navy-mid: #2c3d6b;
    --gold: #f0c040;
    --off-white: #f7f6f2;
    --border: #dddbd4;
    --text: #1e1d1a;
    --muted: #6b6960;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--navy);
    color: var(--off-white);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    background: var(--navy-mid);
    border-bottom: 2px solid var(--gold);
    padding: 14px 32px;
    display: flex;
    align-items: baseline;
    gap: 16px;
    flex-wrap: wrap;
  }
  header h1 {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.06em;
    color: var(--gold);
    text-transform: uppercase;
  }
  header p { font-size: 13px; color: #a8b4d4; }

  .mode-bar {
    width: 100%;
    background: #141e38;
    display: flex;
    padding: 0 32px;
    border-bottom: 1px solid #2a3a60;
    flex-wrap: wrap;
  }
  .mode-btn {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 11px 20px;
    background: none;
    border: none;
    border-bottom: 3px solid transparent;
    color: #6a7da8;
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
  }
  .mode-btn:hover { color: #c0cbe8; }
  .mode-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

  main {
    width: 100%;
    max-width: 1080px;
    padding: 22px 24px 48px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  /* SCENARIO */
  .scenario {
    background: #1f2f54;
    border: 1px solid #344870;
    border-left: 4px solid var(--gold);
    border-radius: 8px;
    padding: 14px 20px;
    font-size: 13.5px;
    line-height: 1.65;
    color: #c8d4ee;
  }
  .scenario strong { color: var(--gold); }

  /* LEGEND */
  .legend {
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    align-items: center;
    padding: 10px 16px;
    background: #f0eeea;
    border-radius: 8px;
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 12.5px;
  }
  .legend-title {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }

  /* MAIN CARD */
  .gen-card {
    background: #f7f6f2;
    border-radius: 10px;
    padding: 18px 20px;
    color: var(--text);
  }
  .gen-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 12px;
    flex-wrap: wrap;
    gap: 10px;
  }
  .gen-label {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .gen-title { font-size: 16px; font-weight: 600; color: var(--text); margin-top: 3px; }

  .gen-stats { display: flex; gap: 10px; flex-wrap: wrap; }
  .stat-chip {
    font-family: var(--mono);
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 500;
  }
  .chip-r  { background: var(--green-light); color: var(--green-dark); }
  .chip-p  { background: var(--amber-light); color: var(--amber); }
  .chip-s  { background: #f0f0f0; color: #555; }
  .chip-t  { background: #e8e8e8; color: #333; }

  /* PETRI */
  .petri-outer {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 14px;
    min-height: 100px;
    position: relative;
  }

  /* Phase label overlay */
  .phase-overlay {
    position: absolute;
    inset: 0;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.06em;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    text-transform: uppercase;
  }
  .phase-overlay.killing {
    background: rgba(192,57,43,0.10);
    color: var(--red);
    opacity: 1;
  }
  .phase-overlay.dividing {
    background: rgba(29,158,117,0.08);
    color: var(--green-dark);
    opacity: 1;
  }

  .petri-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    align-content: flex-start;
    position: relative;
    z-index: 1;
  }

  /* CELL */
  .cell-wrap {
    width: 44px; height: 44px;
    flex-shrink: 0;
    position: relative;
    transition: transform 0.2s;
  }
  .cell-wrap svg { width: 100%; height: 100%; display: block; overflow: visible; }

  /* Animations */
  @keyframes cell-die {
    0%   { transform: scale(1); opacity: 1; }
    40%  { transform: scale(1.12); opacity: 0.8; }
    100% { transform: scale(0.85); opacity: 0.2; }
  }
  @keyframes cell-upgrade {
    0%   { transform: scale(1); }
    30%  { transform: scale(1.3); filter: brightness(1.4); }
    60%  { transform: scale(0.9); }
    100% { transform: scale(1); filter: brightness(1); }
  }
  @keyframes pop-in {
    0%   { transform: scale(0); opacity: 0; }
    70%  { transform: scale(1.12); }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes pre-divide {
    0%   { transform: scale(1); opacity: 1; }
    35%  { transform: scale(1.2); opacity: 1; }
    65%  { transform: scaleX(1.3) scaleY(0.78); opacity: 1; }
    100% { transform: scale(0); opacity: 0; }
  }

  .cell-wrap.anim-die      { animation: cell-die     0.6s ease forwards; }
  .cell-wrap.anim-upgrade  { animation: cell-upgrade  0.6s ease forwards; }
  .cell-wrap.anim-popin    { animation: pop-in        0.45s cubic-bezier(0.34,1.56,0.64,1) both; }
  .cell-wrap.anim-prediv   { animation: pre-divide    0.55s ease-in forwards; }

  /* Daughter cells flying apart */
  .daughter {
    position: absolute;
    width: 44px; height: 44px;
    pointer-events: none;
    z-index: 20;
  }
  .daughter svg { width: 100%; height: 100%; overflow: visible; }
  @keyframes daughter-fly {
    0%   { transform: translate(0,0) scale(0.55); opacity: 0.8; }
    100% { transform: translate(var(--tx),var(--ty)) scale(1); opacity: 1; }
  }
  .daughter.fly { animation: daughter-fly 0.6s cubic-bezier(0.22,1,0.36,1) forwards; }

  /* Antibiotic spray overlay */
  .spray-dot {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    z-index: 5;
    background: rgba(192,57,43,0.55);
    animation: spray-land 0.5s ease forwards;
  }
  @keyframes spray-land {
    0%   { transform: scale(0); opacity: 0.9; }
    60%  { transform: scale(1.2); opacity: 0.7; }
    100% { transform: scale(1); opacity: 0; }
  }

  /* FREQ BAR */
  .freq-section { margin-top: 12px; }
  .freq-label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 5px;
  }
  .freq-bar-wrap {
    height: 24px;
    border-radius: 6px;
    overflow: hidden;
    display: flex;
    background: #e8e8e4;
    border: 1px solid var(--border);
  }
  .freq-seg {
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    color: white;
    transition: width 0.7s cubic-bezier(0.4,0,0.2,1);
    overflow: hidden;
    white-space: nowrap;
    min-width: 0;
  }
  .freq-seg.fr { background: var(--green); }
  .freq-seg.fp { background: var(--amber); }
  .freq-seg.fs { background: #b0ada5; color: #333; }

  /* INSIGHT */
  .insight {
    background: var(--green-light);
    border: 1px solid #9fe1cb;
    border-left: 4px solid var(--green);
    border-radius: 8px;
    padding: 13px 17px;
    font-size: 13.5px;
    line-height: 1.65;
    color: #0a4030;
    display: none;
    margin-top: 12px;
  }
  .insight.show { display: block; animation: slide-in 0.3s ease; }
  @keyframes slide-in {
    from { opacity:0; transform:translateY(-5px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .insight strong { color: var(--green-dark); }

  /* CONTROLS */
  .controls { display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-top:14px; }
  .btn {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 10px 22px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-primary { background: var(--green); color: white; }
  .btn-primary:hover:not(:disabled) { background: var(--green-dark); }
  .btn-primary:disabled { background: #a0cbbf; cursor: not-allowed; }
  .btn-reset { background:none; border:1.5px solid #c0c0b4; color:var(--muted); }
  .btn-reset:hover { border-color:var(--text); color:var(--text); }
  .step-note { font-size:12px; color:var(--muted); font-style:italic; }

  /* TABLE */
  .table-wrap { overflow-x: auto; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
    padding: 8px 10px;
    text-align: center;
    border-bottom: 2px solid var(--border);
    background: #f0eeea;
  }
  th:first-child { text-align:left; }
  td {
    padding: 8px 10px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-weight: 500;
  }
  td:first-child { text-align:left; font-size:12px; color:var(--muted); font-weight:400; }
  tr.row-active td { background:#edf9f4; }
  tr.row-active td:first-child { border-left:3px solid var(--green); }
  .val-hidden { color:#c8c4bc; font-style:italic; font-size:11px; font-weight:400; }
  .pct-hi { color:var(--green-dark); font-weight:700; }
  .pct-lo { color:var(--red); font-weight:600; }

  /* COMPLETE */
  .complete-banner {
    background: var(--navy-mid);
    border: 1.5px solid var(--gold);
    border-radius: 10px;
    padding: 18px 22px;
    display: none;
    flex-direction: column;
    gap: 10px;
  }
  .complete-banner.show { display:flex; animation: slide-in 0.4s ease; }
  .complete-banner h3 {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--gold);
  }
  .complete-banner p { font-size:13.5px; color:#c8d4ee; line-height:1.65; }

  .section-title {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #6a7da8;
    margin-bottom: 8px;
  }

  @media (max-width:600px) {
    main { padding:14px 12px 40px; }
    .cell-wrap { width:28px; height:28px; }
    header { padding:12px 16px; }
    .mode-bar { padding:0 12px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Natural Selection Simulator</h1>
    <p>Biology 1 · Unit 6 · Lesson 113</p>
  </div>
</header>

<div class="mode-bar">
  <button class="mode-btn active" onclick="setMode('bacteria')" id="tab-bacteria">🦠 Bacteria + Penicillin</button>
  <button class="mode-btn" onclick="setMode('insect')"   id="tab-insect">🪲 Insects + Pesticide</button>
</div>

<main>
  <div class="scenario" id="scenario-box"></div>

  <div class="legend" id="legend-box"></div>

  <div class="gen-card">
    <div class="gen-header">
      <div>
        <div class="gen-label" id="gen-label">Generation 0</div>
        <div class="gen-title" id="gen-title">Original population</div>
      </div>
      <div class="gen-stats" id="gen-stats"></div>
    </div>

    <div class="petri-outer" id="petri-outer">
      <div class="phase-overlay" id="phase-overlay"></div>
      <div class="petri-grid"  id="petri-grid"></div>
    </div>

    <div class="freq-section">
      <div class="freq-label">Resistance allele frequency</div>
      <div class="freq-bar-wrap">
        <div class="freq-seg fr" id="freq-r"></div>
        <div class="freq-seg fp" id="freq-p"></div>
        <div class="freq-seg fs" id="freq-s" style="width:100%">susceptible</div>
      </div>
    </div>

    <div class="insight" id="insight-box"></div>

    <div class="controls">
      <button class="btn btn-primary" id="action-btn" onclick="nextStep()"></button>
      <button class="btn btn-reset"   onclick="reset()">↺ Run Again</button>
      <span class="step-note" id="step-note"></span>
    </div>
  </div>

  <div>
    <div class="section-title">Data Table — results vary each run</div>
    <div class="gen-card" style="padding:0;overflow:hidden;">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Generation</th>
              <th>Total</th>
              <th>🟢 Resistant</th>
              <th>🟡 Partial</th>
              <th>⚪ Susceptible</th>
              <th>% Carrying resistance allele</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="complete-banner" id="complete-banner">
    <h3>✓ Simulation Complete — 5 Generations</h3>
    <p id="complete-text"></p>
  </div>
</main>

<script>
// ══════════════════════════════════════════════════════
//  BIOLOGY MODEL
//
//  Phenotypes: 0 = susceptible, 1 = partial, 2 = resistant
//
//  WHAT THE ANTIBIOTIC DOES:
//  • Susceptible (0):  80% killed, 20% survive (stay susceptible)
//  • Partial (1):      50% killed, 50% upgraded to resistant (2)
//  • Resistant (2):    never affected — always survives
//
//  REPRODUCTION (binary fission):
//  • Each survivor divides into exactly 2 daughter cells
//  • Daughters inherit EXACTLY the parent's phenotype
//    (resistance never goes backwards)
//
//  Because susceptible can survive at 20%, resistance trends
//  upward but more gradually — more realistic selection pressure.
// ══════════════════════════════════════════════════════

const MAX_GENS = 6;
const MAX_CELLS = 60; // cap to keep display manageable

function applyPressure(pop) {
  // Returns { survivors: [], outcomes: Map(id -> 'survive'|'killed'|'upgraded') }
  //
  //  Susceptible (0): 80% killed · 20% survive (stay susceptible)
  //  Partial (1):     33% killed · 33% survive (stay partial) · 33% upgraded to resistant
  //  Resistant (2):   always survives
  //
  const outcomes = new Map();
  const survivors = [];
  pop.forEach(cell => {
    if (cell.type === 0) {
      if (Math.random() < 0.8) {
        outcomes.set(cell.id, 'killed');
      } else {
        outcomes.set(cell.id, 'survive');
        survivors.push({ type: 0, id: cell.id });
      }
    } else if (cell.type === 1) {
      const r = Math.random();
      if (r < 0.33) {
        // Killed
        outcomes.set(cell.id, 'killed');
      } else if (r < 0.67) {
        // Survive — stays partial
        outcomes.set(cell.id, 'survive');
        survivors.push({ type: 1, id: cell.id });
      } else {
        // Upgraded to fully resistant
        outcomes.set(cell.id, 'upgraded');
        survivors.push({ type: 2, id: cell.id });
      }
    } else {
      outcomes.set(cell.id, 'survive');
      survivors.push({ type: 2, id: cell.id });
    }
  });
  return { survivors, outcomes };
}

function reproduce(survivors) {
  // Each survivor produces 2 daughters (binary fission), same phenotype.
  // Population is then sampled back to a stable carrying capacity (30–40 cells)
  // proportional to each phenotype's representation among survivors.
  // This models a realistic environment where total population stays roughly stable
  // (limited resources / immune pressure), so susceptible survivors can persist
  // and the 20% survival rate has visible, meaningful effects across generations.
  const nextPop = [];
  survivors.forEach(cell => {
    nextPop.push({ type: cell.type, id: makeId() });
    nextPop.push({ type: cell.type, id: makeId() });
  });
  // Target size: stable around 28–36 cells (mimics carrying capacity)
  const TARGET = 28 + Math.floor(Math.random() * 9);
  if (nextPop.length > TARGET) {
    nextPop.sort(() => Math.random() - 0.5);
    return nextPop.slice(0, TARGET);
  }
  return nextPop;
}

// ══════════════════════════════════════════════════════
//  SVG RENDERERS — bacteria with pili, nucleoid, ribosomes
//  type 0 = susceptible (open/white), 1 = partial (amber), 2 = resistant (green)
// ══════════════════════════════════════════════════════

function bacteriaColors(t) {
  if (t === 2) return { body:'#1D9E75', stroke:'#085041', nucleus:'#085041', dna:'#1D9E75', ribo:'#0a5c42' };
  if (t === 1) return { body:'#d97706', stroke:'#92560a', nucleus:'#92560a', dna:'#fef3c7', ribo:'#78450a' };
  return      { body:'white',   stroke:'#1D9E75', nucleus:'#c8ece0', dna:'#1D9E75',   ribo:'#a8dece' };
}

// Each bacterium gets a stable random rotation and pili pattern based on its id
function bacteriaSeed(id) { return (id * 2654435761) >>> 0; }

function svgForType(t, id = 0) {
  const c = bacteriaColors(t);
  // Use id for deterministic rotation so cells don't all face the same way
  const seed = bacteriaSeed(id || Math.floor(Math.random()*9999));
  const rot = (seed % 360);
  // Vary pili length slightly
  const pl = 6 + (seed % 4);
  return `<svg viewBox="0 0 44 44" style="overflow:visible;">
    <g transform="translate(22,22) rotate(${rot})">
      <!-- Pili (hair-like projections) -->
      <g stroke="${c.stroke}" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.85">
        <line x1="-14" y1="-5"  x2="${-14-pl}" y2="${-9}"/>
        <line x1="-14" y1="0"   x2="${-14-pl}" y2="1"/>
        <line x1="-14" y1="5"   x2="${-14-pl}" y2="9"/>
        <line x1="14"  y1="-5"  x2="${14+pl}"  y2="${-9}"/>
        <line x1="14"  y1="0"   x2="${14+pl}"  y2="1"/>
        <line x1="14"  y1="5"   x2="${14+pl}"  y2="9"/>
        <line x1="-4"  y1="-9"  x2="-5"        y2="${-9-pl}"/>
        <line x1="4"   y1="-9"  x2="5"         y2="${-9-pl}"/>
        <line x1="-4"  y1="9"   x2="-5"        y2="${9+pl}"/>
        <line x1="4"   y1="9"   x2="5"         y2="${9+pl}"/>
      </g>
      <!-- Cell body (ellipse) -->
      <ellipse cx="0" cy="0" rx="14" ry="9" fill="${c.body}" stroke="${c.stroke}" stroke-width="1.8"/>
      <!-- Nucleoid region -->
      <ellipse cx="0" cy="0" rx="6" ry="4" fill="${c.nucleus}" opacity="0.55"/>
      <!-- DNA squiggle inside nucleoid -->
      <path d="M-5,0 Q-2.5,-2.5 0,0 Q2.5,2.5 5,0" stroke="${c.dna}" stroke-width="1" fill="none" opacity="0.9"/>
      <!-- Ribosomes (small dots in cytoplasm) -->
      <circle cx="-8"  cy="-3" r="1.4" fill="${c.ribo}" opacity="0.7"/>
      <circle cx="8"   cy="-3" r="1.4" fill="${c.ribo}" opacity="0.7"/>
      <circle cx="-8"  cy="3"  r="1.4" fill="${c.ribo}" opacity="0.7"/>
      <circle cx="8"   cy="3"  r="1.4" fill="${c.ribo}" opacity="0.7"/>
      <circle cx="0"   cy="-6" r="1.2" fill="${c.ribo}" opacity="0.6"/>
    </g>
  </svg>`;
}

function svgDead(id = 0) {
  const seed = bacteriaSeed(id || 0);
  const rot = seed % 360;
  return `<svg viewBox="0 0 44 44" style="overflow:visible;">
    <g transform="translate(22,22) rotate(${rot})" opacity="0.3">
      <ellipse cx="0" cy="0" rx="14" ry="9" fill="none" stroke="#C0392B" stroke-width="1.8"/>
      <line x1="-8" y1="-5" x2="8" y2="5" stroke="#C0392B" stroke-width="2" stroke-linecap="round"/>
      <line x1="8" y1="-5" x2="-8" y2="5" stroke="#C0392B" stroke-width="2" stroke-linecap="round"/>
    </g>
  </svg>`;
}

function svgSpan(t, size=26) {
  return `<span style="display:inline-block;width:${size}px;height:${size}px;vertical-align:middle;flex-shrink:0;">${svgForType(t)}</span>`;
}

// ══════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════
let mode = 'bacteria';
let step = 0;
let animating = false;
let population = [];
let tableRows = [];
let idCounter = 0;
function makeId() { return ++idCounter; }

function initPopulation() {
  population = [];
  idCounter = 0;
  const total = 26 + Math.floor(Math.random() * 4);

  // Guarantee at least 1 resistant and 2 partial so extinction is impossible
  const guaranteed = [2, 1, 1];
  guaranteed.forEach(type => population.push({ type, id: makeId() }));

  // Fill the rest randomly
  for (let i = guaranteed.length; i < total; i++) {
    const r = Math.random();
    const type = r < 0.06 ? 2 : r < 0.20 ? 1 : 0;
    population.push({ type, id: makeId() });
  }

  // Shuffle so guaranteed cells aren't always first
  for (let i = population.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [population[i], population[j]] = [population[j], population[i]];
  }
}

// ══════════════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════════════
function renderPetri(pop, animIn = false) {
  const grid = document.getElementById('petri-grid');
  grid.innerHTML = '';
  const shuffled = [...pop].sort(() => Math.random() - 0.5);
  shuffled.forEach((cell, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'cell-wrap' + (animIn ? ' anim-popin' : '');
    wrap.dataset.id = cell.id;
    wrap.innerHTML = svgForType(cell.type, cell.id);
    if (animIn) wrap.style.animationDelay = (i * 15) + 'ms';
    grid.appendChild(wrap);
  });
}

function counts(pop) {
  const c = {0:0,1:0,2:0};
  pop.forEach(x => c[x.type]++);
  c.total = pop.length;
  return c;
}

function updateStats(pop) {
  const c = counts(pop);
  document.getElementById('gen-stats').innerHTML = `
    <span class="stat-chip chip-r">${c[2]} resistant</span>
    <span class="stat-chip chip-p">${c[1]} partial</span>
    <span class="stat-chip chip-s">${c[0]} susceptible</span>
    <span class="stat-chip chip-t">${c.total} total</span>
  `;
}

function updateFreq(pop) {
  const c = counts(pop);
  const t = c.total || 1;
  const pR = (c[2]/t*100).toFixed(0);
  const pP = (c[1]/t*100).toFixed(0);
  const pS = (c[0]/t*100).toFixed(0);
  const r = document.getElementById('freq-r');
  const p = document.getElementById('freq-p');
  const s = document.getElementById('freq-s');
  r.style.width = pR+'%'; r.textContent = pR>8 ? pR+'% R' : '';
  p.style.width = pP+'%'; p.textContent = pP>8 ? pP+'% P' : '';
  s.style.width = pS+'%'; s.textContent = pS>8 ? pS+'% susc.' : '';
}

function setPhaseOverlay(mode, text) {
  const ov = document.getElementById('phase-overlay');
  ov.className = 'phase-overlay' + (mode ? ' '+mode : '');
  ov.textContent = text || '';
}

function updateHeader(gen, title) {
  document.getElementById('gen-label').textContent = 'Generation ' + gen;
  document.getElementById('gen-title').textContent = title;
}

function updateBtn() {
  const btn = document.getElementById('action-btn');
  const m = MODES[mode];
  if (step >= MAX_GENS) {
    btn.textContent = '✓ Complete';
    btn.disabled = true;
  } else {
    btn.textContent = m.pressureName + ' → Gen ' + (step+1);
    btn.disabled = false;
  }
  document.getElementById('step-note').textContent =
    step < MAX_GENS
      ? `Generation ${step} of ${MAX_GENS} — results vary each run`
      : `All ${MAX_GENS} generations complete — click Run Again`;
}

function showInsight(genIdx) {
  const m = MODES[mode];
  const box = document.getElementById('insight-box');
  const idx = Math.min(genIdx - 1, m.insights.length - 1);
  box.innerHTML = m.insights[idx];
  box.classList.add('show');
}
function hideInsight() { document.getElementById('insight-box').classList.remove('show'); }

function pushRow(gen, pop) {
  const c = counts(pop);
  const pct = Math.round((c[2]+c[1]) / (c.total||1) * 100);
  tableRows.push({ gen, c, total: c.total, pct });
  rebuildTable();
}

function rebuildTable() {
  const m = MODES[mode];
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';
  for (let g = 0; g <= MAX_GENS; g++) {
    const row = tableRows.find(r => r.gen === g);
    const isActive = row && g === tableRows[tableRows.length-1].gen;
    const tr = document.createElement('tr');
    if (isActive) tr.className = 'row-active';
    if (row) {
      tr.innerHTML = `
        <td>${m.rowLabels[g]}</td>
        <td>${row.total}</td>
        <td>${row.c[2]}</td>
        <td>${row.c[1]}</td>
        <td>${row.c[0]}</td>
        <td><span class="${row.pct>=50?'pct-hi':'pct-lo'}">${row.pct}%</span></td>`;
    } else {
      tr.innerHTML = `<td>${m.rowLabels[g]}</td>
        <td><span class="val-hidden">—</span></td><td><span class="val-hidden">—</span></td>
        <td><span class="val-hidden">—</span></td><td><span class="val-hidden">—</span></td>
        <td><span class="val-hidden">—</span></td>`;
    }
    tbody.appendChild(tr);
  }
}

// ══════════════════════════════════════════════════════
//  ANTIBIOTIC SPRAY VISUAL
//  Rains small red dots across the petri dish
// ══════════════════════════════════════════════════════
async function animateSpray() {
  const outer = document.getElementById('petri-outer');
  const dots = [];
  for (let i = 0; i < 28; i++) {
    const dot = document.createElement('div');
    dot.className = 'spray-dot';
    const sz = 6 + Math.random() * 8;
    dot.style.cssText = `
      width:${sz}px; height:${sz}px;
      left:${Math.random()*90+2}%;
      top:${Math.random()*80+5}%;
      animation-delay: ${Math.random()*400}ms;
    `;
    outer.appendChild(dot);
    dots.push(dot);
  }
  await delay(700);
  dots.forEach(d => d.remove());
}

// ══════════════════════════════════════════════════════
//  KILLING ANIMATION
// ══════════════════════════════════════════════════════
async function animateKilling(outcomes) {
  const grid = document.getElementById('petri-grid');
  const wraps = [...grid.querySelectorAll('.cell-wrap')];

  wraps.forEach(wrap => {
    const id = parseInt(wrap.dataset.id);
    const outcome = outcomes.get(id);
    if (outcome === 'killed') {
      wrap.classList.add('anim-die');
      setTimeout(() => { wrap.innerHTML = svgDead(id); }, 200);
    } else if (outcome === 'upgraded') {
      wrap.classList.add('anim-upgrade');
      setTimeout(() => { wrap.innerHTML = svgForType(2, id); }, 200);
    }
  });

  await delay(750);

  wraps.forEach(wrap => {
    const id = parseInt(wrap.dataset.id);
    if (outcomes.get(id) === 'killed') wrap.remove();
    else wrap.classList.remove('anim-die', 'anim-upgrade');
  });
}

// ══════════════════════════════════════════════════════
//  MITOSIS ANIMATION
//  Each survivor: pinches → vanishes → two daughters fly apart
// ══════════════════════════════════════════════════════
async function animateMitosis(survivors) {
  const grid   = document.getElementById('petri-grid');
  const outer  = document.getElementById('petri-outer');
  const outerR = outer.getBoundingClientRect();
  const wraps  = [...grid.querySelectorAll('.cell-wrap')];
  const newPop = [];

  // Process all cells concurrently in batches of 4 to avoid overwhelming
  const BATCH = 4;
  for (let b = 0; b < wraps.length; b += BATCH) {
    const batch = wraps.slice(b, b + BATCH);
    await Promise.all(batch.map(async (wrap, bi) => {
      const id = parseInt(wrap.dataset.id);
      const parent = survivors.find(c => c.id === id);
      if (!parent) return;

      // Get center of parent in outer coords
      const wr = wrap.getBoundingClientRect();
      const cx = wr.left - outerR.left + wr.width  / 2;
      const cy = wr.top  - outerR.top  + wr.height / 2;

      // Pre-divide animation: grow → pinch → vanish
      wrap.classList.add('anim-prediv');
      await delay(300);

      // Both daughters start at parent center, fly in opposite directions
      const angle = Math.random() * Math.PI * 2;
      const dist  = 24 + Math.random() * 18;

      for (let d = 0; d < 2; d++) {
        // Daughter inherits EXACT phenotype (no backwards movement)
        const dtype = parent.type;
        const did = makeId();
        newPop.push({ type: dtype, id: did });

        const dir = d === 0 ? 1 : -1;
        const tx = Math.cos(angle) * dist * dir;
        const ty = Math.sin(angle) * dist * dir;

        const dEl = document.createElement('div');
        dEl.className = 'daughter';
        dEl.style.left = (cx - 22) + 'px';
        dEl.style.top  = (cy - 22) + 'px';
        dEl.style.setProperty('--tx', tx + 'px');
        dEl.style.setProperty('--ty', ty + 'px');
        dEl.innerHTML = svgForType(dtype, did);
        outer.appendChild(dEl);
        await delay(d * 25);
        dEl.classList.add('fly');
      }

      await delay(680);
      wrap.remove();
      outer.querySelectorAll('.daughter').forEach(d => d.remove());
    }));
    if (b + BATCH < wraps.length) await delay(120);
  }

  return newPop;
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

// ══════════════════════════════════════════════════════
//  MAIN STEP
// ══════════════════════════════════════════════════════
async function nextStep() {
  if (animating || step >= MAX_GENS) return;
  animating = true;
  hideInsight();
  document.getElementById('action-btn').disabled = true;

  const m = MODES[mode];

  // ── Phase 1: SPRAY ──
  setPhaseOverlay('killing', `Applying ${m.pressureName}...`);
  updateHeader(step, `Gen ${step}: ${m.pressureName} applied`);
  await animateSpray();

  // ── Phase 2: KILL / UPGRADE ──
  const { survivors, outcomes } = applyPressure(population);
  await animateKilling(outcomes);
  updateStats(survivors);
  updateFreq(survivors);
  setPhaseOverlay('', '');
  await delay(350);

  // ── Phase 3: MITOSIS ──
  setPhaseOverlay('dividing', 'Binary fission — each cell divides into 2 daughters');
  updateHeader(step, `Gen ${step}: Survivors reproducing`);
  const nextPop = await animateMitosis(survivors);
  setPhaseOverlay('', '');

  // ── Phase 4: NEW GENERATION ──
  step++;
  population = nextPop;
  renderPetri(population, true);
  updateStats(population);
  updateFreq(population);
  updateHeader(step, m.genTitles[step]);
  pushRow(step, population);
  updateBtn();
  showInsight(step);

  if (step >= MAX_GENS) {
    await delay(400);
    document.getElementById('complete-text').innerHTML = m.completeText;
    document.getElementById('complete-banner').classList.add('show');
  }

  animating = false;
}

// ══════════════════════════════════════════════════════
//  RESET / MODE
// ══════════════════════════════════════════════════════
function reset() {
  if (animating) return;
  step = 0;
  tableRows = [];
  animating = false;
  hideInsight();
  setPhaseOverlay('', '');
  document.getElementById('complete-banner').classList.remove('show');
  document.getElementById('petri-outer').querySelectorAll('.daughter,.spray-dot').forEach(e=>e.remove());

  initPopulation();
  renderPetri(population);
  updateStats(population);
  updateFreq(population);
  updateHeader(0, MODES[mode].genTitles[0]);
  pushRow(0, population);
  updateBtn();
}

function setMode(m) {
  if (animating) return;
  mode = m;
  document.getElementById('tab-bacteria').classList.toggle('active', m==='bacteria');
  document.getElementById('tab-insect').classList.toggle('active', m==='insect');
  document.getElementById('scenario-box').innerHTML = MODES[m].scenario;
  document.getElementById('legend-box').innerHTML = `
    <span class="legend-title">Key:</span>
    <span class="legend-item">${svgSpan(2)} Resistant — always survives, divides into 2 resistant daughters</span>
    <span class="legend-item">${svgSpan(1)} Partial — 33% killed · 33% survive (stay partial) · 33% upgraded to resistant</span>
    <span class="legend-item">${svgSpan(0)} Susceptible — 80% killed · 20% survive (stay susceptible)</span>
    <span class="legend-item" style="font-size:12px;color:#888;margin-left:4px;">🔴 spray dots = ${MODES[m].pressureName} particles</span>
  `;
  document.getElementById('complete-banner').classList.remove('show');
  reset();
}
